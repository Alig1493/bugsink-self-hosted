apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bugsink
  namespace: bugsink
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bugsink
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70  # scale up when avg CPU across pods hits 70%
