apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
components:
- ../../components/postgres-statefulset
patches:
- path: configmap-patch.yaml
secretGenerator:
- name: postgres-credentials
  envs:
  - secrets/postgres.env
  options:
    disableNameSuffixHash: true
- name: bugsink-secrets
  envs:
  - secrets/bugsink.env
  options:
    disableNameSuffixHash: true
